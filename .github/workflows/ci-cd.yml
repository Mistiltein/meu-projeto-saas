name: CI/CD - Next.js Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    # Força Node 24 agora (remove o warning)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v6     # ← atualizado

      - name: Setup pnpm
        uses: pnpm/action-setup@v5    # ← atualizado (v5 é o mais recente)
        with:
          version: latest

      - name: Setup Node.js 24
        uses: actions/setup-node@v5   # ← atualizado para v5 (suporta Node 24 nativamente)
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint + Build
        run: |
          pnpm lint
          pnpm build

      - name: Gerar metadados da Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}